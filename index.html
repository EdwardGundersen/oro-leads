<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORO Leads</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D0D; color: #E0E0E0; font-family: 'DM Sans', sans-serif; }
    textarea { font-family: 'DM Mono', monospace; }
    select option { background: #1A1A1A; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }

    /* Password screen */
    #password-screen {
      position: fixed; inset: 0; background: #0D0D0D;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 24px;
    }
    #password-screen h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px; color: #F5F0E8; letter-spacing: -0.02em;
    }
    #password-screen p { font-size: 13px; color: #424242; font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }
    #password-screen input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 12px 20px;
      color: #F5F0E8; font-size: 15px; font-family: 'DM Mono', monospace;
      outline: none; text-align: center; width: 260px;
      letter-spacing: 0.2em;
    }
    #password-screen input:focus { border-color: rgba(255,255,255,0.25); }
    #password-screen button {
      background: #F5F0E8; color: #0D0D0D;
      border: none; border-radius: 8px;
      padding: 12px 32px; font-size: 13px;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
      cursor: pointer; width: 260px;
    }
    #password-screen .error { color: #EF9A9A; font-size: 12px; font-family: 'DM Mono', monospace; }
    #app { display: none; }
    #app.visible { display: block; }
  </style>
</head>
<body>

<!-- Password screen -->
<div id="password-screen">
  <div style="text-align:center">
    <h1>ORO</h1>
    <p style="margin-top:6px">LEADS DASHBOARD</p>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px">
    <input type="password" id="pw-input" placeholder="Passord" onkeydown="if(event.key==='Enter')checkPw()" />
    <p id="pw-error" class="error" style="display:none">Feil passord. Prøv igjen.</p>
    <button onclick="checkPw()">Logg inn</button>
  </div>
  <p>Kun for ORO-ansatte</p>
</div>

<div id="app"></div>

<script>
  // ⚠️ ENDRE DETTE PASSORDET før du laster opp!
  const PASSORD = "oro2024";

  function checkPw() {
    const val = document.getElementById('pw-input').value;
    if (val === PASSORD) {
      document.getElementById('password-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      sessionStorage.setItem('oro-auth', '1');
    } else {
      document.getElementById('pw-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
    }
  }

  if (sessionStorage.getItem('oro-auth') === '1') {
    document.getElementById('password-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
  }
</script>

<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = "oro-leads-v1";
const STATUS_CONFIG = {
  "Ny":        { color: "#4FC3F7", bg: "rgba(79,195,247,0.12)",  dot: "#4FC3F7" },
  "Kontaktet": { color: "#FFB74D", bg: "rgba(255,183,77,0.12)",  dot: "#FFB74D" },
  "I prosess": { color: "#CE93D8", bg: "rgba(206,147,216,0.12)", dot: "#CE93D8" },
  "Vunnet":    { color: "#81C784", bg: "rgba(129,199,132,0.12)", dot: "#81C784" },
  "Tapt":      { color: "#EF9A9A", bg: "rgba(239,154,154,0.12)", dot: "#EF9A9A" },
};
const ANSATTE = ["Edward Gundersen","Knut","Sara","Thomas","Maria","Annen ansatt"];

function StatusBadge({ status, onClick }) {
  const cfg = STATUS_CONFIG[status] || STATUS_CONFIG["Ny"];
  return (
    <button onClick={onClick} style={{
      background: cfg.bg, color: cfg.color,
      border: `1px solid ${cfg.color}40`, borderRadius: "20px",
      padding: "3px 10px", fontSize: "11px",
      fontFamily: "'DM Mono', monospace", letterSpacing: "0.05em",
      cursor: "pointer", display: "flex", alignItems: "center", gap: "5px",
      transition: "all 0.2s",
    }}>
      <span style={{ width:6, height:6, borderRadius:"50%", background:cfg.dot, display:"inline-block" }} />
      {status}
    </button>
  );
}

function LeadCard({ lead, onStatusChange, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  const statuses = Object.keys(STATUS_CONFIG);
  const nextStatus = () => onStatusChange((statuses.indexOf(lead.status) + 1) % statuses.length);

  return (
    <div style={{
      background: "rgba(255,255,255,0.03)",
      border: "1px solid rgba(255,255,255,0.08)",
      borderRadius: "12px", padding: "20px", marginBottom: "12px",
      transition: "background 0.2s",
    }}
      onMouseEnter={e => e.currentTarget.style.background="rgba(255,255,255,0.055)"}
      onMouseLeave={e => e.currentTarget.style.background="rgba(255,255,255,0.03)"}
    >
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"6px", flexWrap:"wrap" }}>
            <span style={{ fontFamily:"'Playfair Display',serif", fontSize:"16px", color:"#F5F0E8", fontWeight:600 }}>
              {lead.navn || "Ukjent navn"}
            </span>
            <span style={{
              background: lead.kilde==="FINN.no" ? "rgba(255,60,0,0.15)" : "rgba(0,120,255,0.15)",
              color: lead.kilde==="FINN.no" ? "#FF6B35" : "#60A5FA",
              border: `1px solid ${lead.kilde==="FINN.no" ? "#FF6B3540" : "#60A5FA40"}`,
              borderRadius:"4px", padding:"2px 8px", fontSize:"10px",
              fontFamily:"'DM Mono',monospace", letterSpacing:"0.08em"
            }}>
              {lead.kilde || "Ukjent kilde"}
            </span>
          </div>
          <div style={{ fontSize:"13px", color:"#9E9E9E", marginBottom:"8px" }}>
            {lead.eiendom || lead.soek || "—"}
          </div>
          <div style={{ display:"flex", gap:"16px", flexWrap:"wrap" }}>
            {lead.telefon && <span style={{ fontSize:"12px", color:"#B0BEC5", fontFamily:"'DM Mono',monospace" }}>📞 {lead.telefon}</span>}
            {lead.epost   && <span style={{ fontSize:"12px", color:"#B0BEC5", fontFamily:"'DM Mono',monospace" }}>✉️ {lead.epost}</span>}
            {lead.areal   && <span style={{ fontSize:"12px", color:"#B0BEC5", fontFamily:"'DM Mono',monospace" }}>📐 {lead.areal}</span>}
          </div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:"8px", marginLeft:"12px" }}>
          <StatusBadge status={lead.status} onClick={nextStatus} />
          <span style={{ fontSize:"10px", color:"#616161", fontFamily:"'DM Mono',monospace" }}>{lead.dato}</span>
        </div>
      </div>

      {lead.melding && (
        <div onClick={() => setExpanded(!expanded)} style={{
          marginTop:"12px", padding:"10px 14px",
          background:"rgba(255,255,255,0.03)", borderRadius:"8px",
          borderLeft:"2px solid rgba(255,255,255,0.1)",
          fontSize:"12px", color:"#9E9E9E", lineHeight:"1.6",
          maxHeight: expanded ? "200px" : "40px",
          overflow:"hidden", transition:"max-height 0.3s ease",
          cursor:"pointer",
        }}>
          {lead.melding}
        </div>
      )}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:"12px" }}>
        <span style={{ fontSize:"11px", color:"#616161" }}>👤 {lead.ansvarlig || "Ikke tildelt"}</span>
        <button onClick={onDelete} style={{
          background:"none", border:"none", color:"#424242",
          cursor:"pointer", fontSize:"12px", transition:"color 0.2s",
        }}
          onMouseEnter={e=>e.target.style.color="#EF9A9A"}
          onMouseLeave={e=>e.target.style.color="#424242"}
        >slett</button>
      </div>
    </div>
  );
}

function App() {
  const [leads, setLeads] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
  });
  const [emailText, setEmailText]   = useState("");
  const [ansvarlig, setAnsvarlig]   = useState("Edward Gundersen");
  const [loading, setLoading]       = useState(false);
  const [error, setError]           = useState("");
  const [activeFilter, setActiveFilter] = useState("Alle");
  const [showInput, setShowInput]   = useState(false);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(leads));
  }, [leads]);

  const parseEmail = async () => {
    if (!emailText.trim()) return;
    setLoading(true); setError("");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: `Du er en assistent som hjelper norske eiendomsmeglere å strukturere leads fra e-post.
Svar KUN med et JSON-objekt, ingen forklaring, ingen markdown. Formatet:
{"navn":"fullt navn","telefon":"telefonnummer eller null","epost":"e-post eller null","kilde":"FINN.no eller NE.meet eller Annet","eiendom":"navn/adresse på eiendom eller null","soek":"beskrivelse av søk eller null","areal":"areal f.eks 200-250m² eller null","melding":"kort sammendrag","type":"interessent eller soeker"}`,
          messages: [{ role:"user", content:`Parse denne e-posten:\n\n${emailText}` }]
        })
      });
      const data = await res.json();
      const parsed = JSON.parse(data.content[0].text.replace(/```json|```/g,"").trim());
      const nyLead = {
        ...parsed, id: Date.now(), status:"Ny", ansvarlig,
        dato: new Date().toLocaleDateString("nb-NO",{day:"2-digit",month:"short",year:"numeric"})
      };
      setLeads(prev => [nyLead, ...prev]);
      setEmailText(""); setShowInput(false);
    } catch(e) { setError("Kunne ikke parse e-posten. Prøv igjen."); }
    setLoading(false);
  };

  const updateStatus = (id, idx) => {
    const statuses = Object.keys(STATUS_CONFIG);
    setLeads(prev => prev.map(l => l.id===id ? {...l, status:statuses[idx]} : l));
  };
  const deleteLead = (id) => setLeads(prev => prev.filter(l => l.id!==id));

  const filtered = activeFilter==="Alle" ? leads : leads.filter(l=>l.status===activeFilter);
  const counts = Object.keys(STATUS_CONFIG).reduce((acc,s)=>({...acc,[s]:leads.filter(l=>l.status===s).length}),{});

  return (
    <div style={{ minHeight:"100vh", background:"#0D0D0D" }}>
      {/* Header */}
      <div style={{
        borderBottom:"1px solid rgba(255,255,255,0.06)",
        padding:"24px 32px", display:"flex",
        justifyContent:"space-between", alignItems:"center",
      }}>
        <div>
          <div style={{ display:"flex", alignItems:"baseline", gap:"10px" }}>
            <span style={{ fontFamily:"'Playfair Display',serif", fontSize:"22px", color:"#F5F0E8" }}>ORO</span>
            <span style={{ color:"#424242", fontSize:"12px", fontFamily:"'DM Mono',monospace", letterSpacing:"0.15em" }}>LEADS</span>
          </div>
          <div style={{ fontSize:"12px", color:"#424242", marginTop:"2px" }}>{leads.length} leads totalt</div>
        </div>
        <button onClick={()=>setShowInput(!showInput)} style={{
          background: showInput ? "rgba(255,255,255,0.05)" : "#F5F0E8",
          color: showInput ? "#616161" : "#0D0D0D",
          border:"none", borderRadius:"8px", padding:"10px 20px",
          fontSize:"13px", fontWeight:500, cursor:"pointer", transition:"all 0.2s",
        }}>
          {showInput ? "Avbryt" : "+ Legg til lead"}
        </button>
      </div>

      <div style={{ padding:"24px 32px", maxWidth:"860px", margin:"0 auto" }}>
        {/* Input panel */}
        {showInput && (
          <div style={{
            background:"rgba(255,255,255,0.03)",
            border:"1px solid rgba(255,255,255,0.08)",
            borderRadius:"14px", padding:"24px", marginBottom:"24px",
          }}>
            <div style={{ fontSize:"13px", color:"#757575", marginBottom:"12px", fontFamily:"'DM Mono',monospace", letterSpacing:"0.05em" }}>
              LIM INN E-POSTTEKST
            </div>
            <textarea value={emailText} onChange={e=>setEmailText(e.target.value)}
              placeholder="Kopier og lim inn e-posten fra FINN.no, NE.meet eller annen kilde her..."
              style={{
                width:"100%", minHeight:"140px",
                background:"rgba(0,0,0,0.3)",
                border:"1px solid rgba(255,255,255,0.06)",
                borderRadius:"8px", padding:"14px",
                color:"#E0E0E0", fontSize:"13px", lineHeight:"1.7",
                resize:"vertical", outline:"none",
              }}
            />
            <div style={{ display:"flex", gap:"12px", marginTop:"12px", alignItems:"center", flexWrap:"wrap" }}>
              <select value={ansvarlig} onChange={e=>setAnsvarlig(e.target.value)} style={{
                background:"rgba(0,0,0,0.3)",
                border:"1px solid rgba(255,255,255,0.08)",
                borderRadius:"6px", padding:"8px 12px",
                color:"#9E9E9E", fontSize:"13px", outline:"none", cursor:"pointer",
              }}>
                {ANSATTE.map(a=><option key={a} value={a}>{a}</option>)}
              </select>
              <button onClick={parseEmail} disabled={loading||!emailText.trim()} style={{
                background: (loading||!emailText.trim()) ? "rgba(245,240,232,0.3)" : "#F5F0E8",
                color:"#0D0D0D", border:"none", borderRadius:"8px",
                padding:"10px 24px", fontSize:"13px", fontWeight:500,
                cursor: loading ? "wait" : "pointer", transition:"all 0.2s",
              }}>
                {loading ? "Analyserer..." : "✦ Parse med AI"}
              </button>
              {error && <span style={{ color:"#EF9A9A", fontSize:"12px" }}>{error}</span>}
            </div>
          </div>
        )}

        {/* Filter tabs */}
        <div style={{ display:"flex", gap:"8px", marginBottom:"20px", flexWrap:"wrap" }}>
          {["Alle",...Object.keys(STATUS_CONFIG)].map(s => {
            const cfg = STATUS_CONFIG[s];
            const count = s==="Alle" ? leads.length : counts[s]||0;
            const active = activeFilter===s;
            return (
              <button key={s} onClick={()=>setActiveFilter(s)} style={{
                background: active ? (cfg ? cfg.bg : "rgba(255,255,255,0.1)") : "rgba(255,255,255,0.02)",
                border: `1px solid ${active ? (cfg ? cfg.color+"40" : "rgba(255,255,255,0.2)") : "rgba(255,255,255,0.06)"}`,
                borderRadius:"20px", padding:"5px 14px",
                color: active ? (cfg ? cfg.color : "#F5F0E8") : "#616161",
                fontSize:"12px", fontFamily:"'DM Mono',monospace",
                cursor:"pointer", transition:"all 0.2s",
              }}>
                {s} · {count}
              </button>
            );
          })}
        </div>

        {/* Lead list */}
        {filtered.length===0 ? (
          <div style={{ textAlign:"center", padding:"80px 0", color:"#2A2A2A" }}>
            <div style={{ fontSize:"40px", marginBottom:"16px" }}>◇</div>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:"18px", color:"#3A3A3A", marginBottom:"8px" }}>
              Ingen leads ennå
            </div>
            <div style={{ fontSize:"13px" }}>
              Lim inn en e-post fra FINN.no eller NE.meet for å komme i gang
            </div>
          </div>
        ) : (
          filtered.map(lead => (
            <LeadCard key={lead.id} lead={lead}
              onStatusChange={idx=>updateStatus(lead.id,idx)}
              onDelete={()=>deleteLead(lead.id)}
            />
          ))
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
</body>
</html>
